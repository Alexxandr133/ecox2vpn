<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VPN панель</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050816;
      --bg-card: #0f172a;
      --accent: #38bdf8;
      --accent-soft: rgba(56, 189, 248, 0.12);
      --text: #e5e7eb;
      --text-muted: #9ca3af;
      --border: #1f2933;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Roboto", sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #0f172a 0, #020617 45%, #000 100%);
      color: var(--text);
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: 16px;
    }

    .shell {
      width: 100%;
      max-width: 480px;
      margin: auto;
      background: linear-gradient(145deg, rgba(15, 23, 42, 0.92), rgba(15, 23, 42, 0.98));
      border-radius: 18px;
      border: 1px solid rgba(148, 163, 184, 0.12);
      box-shadow:
        0 40px 80px rgba(15, 23, 42, 0.9),
        0 0 0 1px rgba(15, 23, 42, 0.8);
      overflow: hidden;
      backdrop-filter: blur(18px);
    }

    .shell-header {
      padding: 14px 18px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(148, 163, 184, 0.2);
      background: radial-gradient(circle at top left, rgba(56, 189, 248, 0.08), transparent 55%);
    }

    .shell-title {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .shell-title-main {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.02em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .shell-pill {
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(56, 189, 248, 0.4);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
    }

    .shell-title-sub {
      font-size: 11px;
      color: var(--text-muted);
    }

    .shell-badge {
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(22, 163, 74, 0.12);
      border: 1px solid rgba(34, 197, 94, 0.5);
      font-size: 11px;
      color: #bbf7d0;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .shell-badge-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.25);
    }

    .content {
      padding: 18px 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .hero {
      padding: 12px 12px 10px;
      border-radius: 16px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.16), transparent 60%),
        linear-gradient(135deg, rgba(15, 23, 42, 0.96), rgba(15, 23, 42, 0.9));
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .hero-title {
      font-size: 17px;
      font-weight: 600;
    }

    .hero-title span {
      color: var(--accent);
    }

    .hero-sub {
      font-size: 12px;
      color: var(--text-muted);
    }

    .hero-tagline {
      margin-top: 4px;
      font-size: 11px;
      color: #a5b4fc;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card {
      padding: 10px 11px;
      border-radius: 14px;
      background: var(--bg-card);
      border: 1px solid rgba(30, 64, 175, 0.6);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .card-main {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .card-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
    }

    .card-value {
      font-size: 14px;
      font-weight: 500;
    }

    .pill-soft {
      padding: 4px 8px;
      border-radius: 999px;
      background: var(--accent-soft);
      border: 1px solid rgba(56, 189, 248, 0.5);
      font-size: 11px;
      color: var(--accent);
    }
    .ms-good { color: #22c55e; }
    .ms-warn { color: #f59e0b; }
    .ms-bad { color: #ef4444; }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 4px;
    }

    .btn-primary {
      width: 100%;
      padding: 11px 12px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      color: #0b1120;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      box-shadow:
        0 12px 35px rgba(56, 189, 248, 0.45),
        0 0 0 1px rgba(15, 23, 42, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary:active {
      transform: translateY(1px);
      box-shadow:
        0 6px 18px rgba(56, 189, 248, 0.35),
        0 0 0 1px rgba(15, 23, 42, 0.8);
    }

    .btn-secondary {
      width: 100%;
      padding: 9px 12px;
      border-radius: 999px;
      border: 1px dashed rgba(148, 163, 184, 0.6);
      background: rgba(15, 23, 42, 0.7);
      color: var(--text-muted);
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .footer {
      margin-top: 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 10px;
      color: var(--text-muted);
      opacity: 0.9;
    }

    .footer-pill {
      padding: 3px 7px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.5);
      background: rgba(15, 23, 42, 0.9);
      font-size: 10px;
    }

    .keybox {
      padding: 10px 11px;
      border-radius: 14px;
      background: rgba(2, 6, 23, 0.85);
      border: 1px solid rgba(148, 163, 184, 0.25);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .keybox textarea {
      width: 100%;
      min-height: 92px;
      resize: none;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 12px;
      padding: 10px;
      color: var(--text);
      font-size: 12px;
      line-height: 1.35;
      outline: none;
    }

    .row {
      display: flex;
      gap: 8px;
    }

    .btn-small {
      flex: 1;
      padding: 9px 10px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.25);
      background: rgba(15, 23, 42, 0.75);
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
    }

    .note { display: none; }
  </style>
</head>
<body>
  <div class="shell">
    <div class="shell-header">
      <div class="shell-title">
        <div class="shell-title-main">
          EcoX2vpn
          <span class="shell-pill">VPN</span>
        </div>
        <div class="shell-title-sub"></div>
      </div>
      <div class="shell-badge">
        <span class="shell-badge-dot" id="panelDot"></span>
        <span id="panelStatus">Активно</span>
      </div>
    </div>

    <div class="content">
      <section class="hero">
        <div class="hero-title">
          Твой <span>VPN‑кабинет</span> в Telegram
        </div>
        <div class="hero-sub" id="hello">
          Загружаем данные…
        </div>
        <div class="hero-tagline" id="statusLine"></div>
      </section>

      <section class="cards">
        <div class="card">
          <div class="card-main">
            <div class="card-label">Статус сервера</div>
            <div class="card-value">Онлайн • <span id="pingValue">…</span> мс</div>
          </div>
          <div class="pill-soft">
            VLESS ready
          </div>
        </div>

        <div class="card">
          <div class="card-main">
            <div class="card-label">Твоя подписка</div>
            <div class="card-value" id="subLine">Не оформлена</div>
          </div>
          <div class="pill-soft">
            VLESS
          </div>
        </div>
      </section>

      <section class="keybox">
        <div class="card-label">Ссылка подписки</div>
        <textarea id="key" readonly placeholder="Нажми «Создать ссылку подписки», затем скопируй её и вставь в V2RayTun или другой клиент."></textarea>
        <div class="row">
          <button class="btn-primary" id="createBtn" type="button">Создать ссылку подписки</button>
        </div>
        <div class="row">
          <button class="btn-small" id="copyBtn" type="button">Копировать</button>
          <button class="btn-small" id="shareBtn" type="button">Поделиться</button>
        </div>
        <div class="row">
          <button class="btn-small" id="guideBtn" type="button">Инструкция подключения</button>
        </div>
        <div class="note" id="note">
          
        </div>
      </section>

      <div class="footer">
        <span id="footerLeft">ecox2vpn.online</span>
        <span class="footer-pill">v1</span>
      </div>
    </div>
  </div>

  <script>
    const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
    const hello = document.getElementById("hello");
    const statusLine = document.getElementById("statusLine");
    const subLine = document.getElementById("subLine");
    const keyEl = document.getElementById("key");
    const createBtn = document.getElementById("createBtn");
    const copyBtn = document.getElementById("copyBtn");
    const shareBtn = document.getElementById("shareBtn");
    const guideBtn = document.getElementById("guideBtn");
    const note = document.getElementById("note");
    const pingValue = document.getElementById("pingValue");
    const panelStatus = document.getElementById("panelStatus");
    const panelDot = document.getElementById("panelDot");

    function setBusy(isBusy) {
      createBtn.disabled = isBusy;
      createBtn.style.opacity = isBusy ? "0.7" : "1";
    }

    async function postJson(url, body) {
      const res = await fetch(url, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(body),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        throw new Error(data.detail || "Request failed");
      }
      return data;
    }

    function safeInitData() {
      return tg ? (tg.initData || "") : "";
    }

    async function loadMe() {
      try {
        if (!tg) {
          hello.textContent = "Вход через Telegram не выполнен";
          statusLine.textContent = "Открой кабинет из приложения Telegram";
          note.textContent = "Для безопасности ключи выдаются только авторизованным пользователям Telegram.";
          panelStatus.textContent = "Не активно";
          panelDot.style.opacity = "0.4";
          return;
        }

        tg.ready();
        tg.expand();

        const data = await postJson("/api/me", { initData: safeInitData() });
        const u = data.user;
        const name = [u.first_name, u.last_name].filter(Boolean).join(" ").trim() || (u.username ? "@" + u.username : "User");
        hello.textContent = `Привет, ${name}!`;

        if (data.disabled) {
          statusLine.textContent = "Доступ отключён администратором";
          subLine.textContent = "Подписка отключена";
          keyEl.value = "";
          createBtn.textContent = "Доступ отключён";
          createBtn.disabled = true;
          createBtn.style.opacity = "0.55";
          note.textContent = data.disabled_reason ? ("Причина: " + data.disabled_reason) : "Обратись в поддержку.";
          panelStatus.textContent = "Не активно";
          panelDot.style.opacity = "0.4";
          return;
        }

        if (data.subscription_url) {
          subLine.textContent = "Подписка активна";
          keyEl.value = data.subscription_url;
          createBtn.textContent = "Обновить ключ в подписке";
          createBtn.disabled = false;
          createBtn.style.opacity = "1";
        } else {
          subLine.textContent = "Не оформлена";
          keyEl.value = "";
          createBtn.textContent = "Создать ссылку подписки";
        }
      } catch (e) {
        statusLine.textContent = "Ошибка авторизации";
        hello.textContent = "Не удалось загрузить данные.";
        note.textContent = "Не удалось авторизоваться. Проверь вход в Telegram и попробуй снова.";
        panelStatus.textContent = "Не активно";
        panelDot.style.opacity = "0.4";
      }
    }

    createBtn.addEventListener("click", async () => {
      try {
        setBusy(true);
        const data = await postJson("/api/vpn/create", { initData: safeInitData() });
        if (data.subscription_url) {
          keyEl.value = data.subscription_url;
          subLine.textContent = data.existing ? "Подписка уже была создана" : "Подписка создана";
        } else {
          subLine.textContent = "Не удалось получить ссылку подписки";
        }
      } catch (e) {
        note.textContent = "Не удалось создать ключ. Попробуй ещё раз через пару секунд.";
      } finally {
        setBusy(false);
      }
    });

    copyBtn.addEventListener("click", async () => {
      const text = keyEl.value || "";
      if (!text) return;
      try {
        await navigator.clipboard.writeText(text);
        note.textContent = "Скопировано в буфер обмена.";
      } catch {
        keyEl.select();
        document.execCommand("copy");
        note.textContent = "Скопировано.";
      }
    });

    async function updatePing() {
      const start = performance.now();
      try {
        await fetch("/api/ping", { cache: "no-store" });
        const ms = Math.max(1, Math.round(performance.now() - start));
        pingValue.textContent = String(ms);
        pingValue.classList.remove("ms-good", "ms-warn", "ms-bad");
        if (ms < 120) {
          pingValue.classList.add("ms-good");
        } else if (ms < 250) {
          pingValue.classList.add("ms-warn");
        } else {
          pingValue.classList.add("ms-bad");
        }
      } catch {
        pingValue.textContent = "—";
        pingValue.classList.remove("ms-good", "ms-warn", "ms-bad");
      }
    }

    shareBtn.addEventListener("click", async () => {
      const text = keyEl.value || "";
      if (!text) return;
      if (tg && tg.openTelegramLink) {
        tg.openTelegramLink("https://t.me/share/url?url=" + encodeURIComponent(text));
        return;
      }
      note.textContent = "Открой это в Telegram, чтобы поделиться.";
    });

    guideBtn.addEventListener("click", () => {
      window.location.href = "/guide";
    });

    updatePing();
    setInterval(updatePing, 10000);
    loadMe();
  </script>
</body>
</html>
